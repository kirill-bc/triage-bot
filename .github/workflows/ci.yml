name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check (mypy)
        run: mypy .

      - name: Lint (pytest -m lint)
        run: pytest -m lint

      - name: Unit and integration tests (pytest -m "unit or integration")
        run: pytest -m "unit or integration"
